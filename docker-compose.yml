# CodeAlpha FAQ Chatbot — Docker Compose
# Orchestrates both frontend and backend with a single command.
# Registration ID: Akshay Saxena
# ============================================================

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: faq-chatbot-backend
    ports:
      - "7860:7860"
    volumes:
      - db-data:/app/backend
    environment:
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: faq-chatbot-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
