# ============================================================
# CodeAlpha FAQ Chatbot — Google Cloud Build & Cloud Run
# Zero-downtime deployment configuration.
# Registration ID: Akshay Saxena
# ============================================================

steps:
  # Step 1: Build backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/faq-chatbot-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/faq-chatbot-backend:latest'
      - './backend'

  # Step 2: Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/faq-chatbot-backend:$COMMIT_SHA'

  # Step 3: Build frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/faq-chatbot-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/faq-chatbot-frontend:latest'
      - './frontend'

  # Step 4: Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/faq-chatbot-frontend:$COMMIT_SHA'

  # Step 5: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'faq-chatbot-backend'
      - '--image=gcr.io/$PROJECT_ID/faq-chatbot-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=7860'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--allow-unauthenticated'
      - '--set-env-vars=CORS_ORIGINS=["https://faq-chatbot-frontend-*.run.app"]'

  # Step 6: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'faq-chatbot-frontend'
      - '--image=gcr.io/$PROJECT_ID/faq-chatbot-frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=80'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/faq-chatbot-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/faq-chatbot-frontend:$COMMIT_SHA'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
